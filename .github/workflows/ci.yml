name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Compile check
        run: |
          python -m py_compile $(find source -name '*.py')
          python -m py_compile $(find tests -name '*.py')

      - name: Run tests
        env:
          SECRET_KEY: ci-test-key-placeholder
        run: pytest -v --cov --cov-report=term

      - name: Secrets check
        run: |
          if git ls-files | xargs grep -l 'password\s*=\s*' 2>/dev/null; then
            echo "WARNING: potential secrets in tracked files"
          fi
          if git ls-files | grep -E '\.env$|credentials\.json$' 2>/dev/null; then
            echo "WARNING: sensitive files tracked"
          fi

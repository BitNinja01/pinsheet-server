{% extends "base.html" %}
{% block content %}

<div class="ps-topbar">
    <div>
        <div class="ps-eyebrow">Challenge</div>
        <h1 class="ps-h1">Create a new <em>challenge</em>.</h1>
    </div>
</div>

<form method="post" class="settings-form" style="margin-top: 24px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    {% if error %}
    <div style="color:var(--ps-warn);font-family:var(--ps-font-mono);font-size:var(--ps-fs-eyebrow);margin-bottom:16px;">{{ error }}</div>
    {% endif %}

    <div class="settings-group">
        <h3>Title</h3>
        <input type="text" name="title" class="settings-field" style="width:100%;font-family:var(--ps-font-mono);font-size:var(--ps-fs-eyebrow);padding:8px;border:1px solid var(--ps-rule-c);background:var(--ps-paper);color:var(--ps-ink);" placeholder="e.g. Summer Scramble Showdown" required>
    </div>

    <div class="settings-group">
        <h3>Participants (select at least 2)</h3>
        {% for u in users %}
        <label class="settings-toggle">
            <input type="checkbox" name="participants" value="{{ u.id }}">
            {% set initials = [] %}
            {% for w in u.display_name.split() %}
            {% if loop.index <= 2 %}{% set _ = initials.append(w[:1] | upper) %}{% endif %}
            {% endfor %}
            <span class="ps-avatar" style="width:22px;height:22px;font-size:var(--ps-fs-micro);vertical-align:middle;">{{ initials | join('') }}</span>
            {{ u.display_name }}
        </label>
        {% endfor %}
    </div>

    <div class="settings-group">
        <h3>Start Date</h3>
        <input type="date" name="start_date" value="{{ today }}" class="settings-field" style="font-family:var(--ps-font-mono);font-size:var(--ps-fs-eyebrow);padding:8px;border:1px solid var(--ps-rule-c);background:var(--ps-paper);color:var(--ps-ink);">
    </div>

    <div class="settings-group">
        <h3>End Date</h3>
        <input type="date" name="end_date" value="{{ today }}" class="settings-field" style="font-family:var(--ps-font-mono);font-size:var(--ps-fs-eyebrow);padding:8px;border:1px solid var(--ps-rule-c);background:var(--ps-paper);color:var(--ps-ink);">
    </div>

    <div class="settings-group">
        <h3>Stat</h3>
        <select name="stat_key" class="settings-field" style="width:100%;font-family:var(--ps-font-mono);font-size:var(--ps-fs-eyebrow);padding:8px;border:1px solid var(--ps-rule-c);background:var(--ps-paper);color:var(--ps-ink);">
            {% for s in stat_catalog %}
            <option value="{{ s.key }}">
                {{ s.label }}{% if s.suffix %} ({{ s.suffix }}){% endif %}
                {% if s.higher_better %}— Higher is better{% else %}— Lower is better{% endif %}
            </option>
            {% endfor %}
        </select>
    </div>

    <button type="submit" class="ps-btn">Create Challenge</button>
    <a href="/?tab=challenges" class="ps-btn ps-btn--ghost">Cancel</a>
</form>

{% endblock %}

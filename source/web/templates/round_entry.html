{% extends "base.html" %}
{% block extra_head %}
<link rel="stylesheet" href="/static/flatpickr.min.css">
<style>
.flatpickr-calendar {
    background: var(--ps-paper);
    border: var(--ps-rule) solid var(--ps-rule-c);
    border-radius: 0;
    box-shadow: none;
    margin-top: 4px;
    font-family: var(--ps-font-mono);
}
.flatpickr-months {
    background: var(--ps-paper-2);
    border-radius: 0;
}
.flatpickr-months .flatpickr-month,
.flatpickr-current-month .flatpickr-monthDropdown-months,
.flatpickr-current-month input.cur-year {
    font-family: var(--ps-font-mono);
    font-size: var(--ps-fs-body);
    color: var(--ps-ink);
}
.flatpickr-current-month .flatpickr-monthDropdown-months {
    background: var(--ps-paper-2);
    color: var(--ps-ink);
    border: none;
    padding: 0;
}
.flatpickr-current-month input.cur-year {
    background: var(--ps-paper-2);
    color: var(--ps-ink);
    padding: 0;
}
.flatpickr-current-month .numInputWrapper span.arrowUp,
.flatpickr-current-month .numInputWrapper span.arrowDown {
    border-color: var(--ps-rule-c);
}
.flatpickr-weekday {
    color: var(--ps-ink-3);
    font-family: var(--ps-font-mono);
    font-size: var(--ps-fs-caption);
    font-weight: var(--ps-fw-label);
}
.flatpickr-day {
    color: var(--ps-ink);
    font-family: var(--ps-font-mono);
    font-size: var(--ps-fs-caption);
    border-radius: 0;
}
.flatpickr-day.weekend {
    color: var(--ps-ink);
    background: transparent;
}
.flatpickr-day.today {
    border-color: var(--ps-accent);
    background: var(--ps-accent-dim);
}
.flatpickr-day:hover,
.flatpickr-day:focus {
    background: var(--ps-accent-dim);
    border-color: var(--ps-accent);
}
.flatpickr-day.selected,
.flatpickr-day.startRange,
.flatpickr-day.endRange,
.flatpickr-day.selected.inRange,
.flatpickr-day.startRange.inRange,
.flatpickr-day.endRange.inRange,
.flatpickr-day.selected:focus,
.flatpickr-day.startRange:focus,
.flatpickr-day.endRange:focus,
.flatpickr-day.selected:hover,
.flatpickr-day.startRange:hover,
.flatpickr-day.endRange:hover,
.flatpickr-day.selected.prevMonthDay,
.flatpickr-day.startRange.prevMonthDay,
.flatpickr-day.endRange.prevMonthDay,
.flatpickr-day.selected.nextMonthDay,
.flatpickr-day.startRange.nextMonthDay,
.flatpickr-day.endRange.nextMonthDay {
    background: var(--ps-accent);
    border-color: var(--ps-accent);
    color: var(--ps-accent-fg);
}
.flatpickr-day.inRange {
    background: var(--ps-accent-dim);
    border-color: transparent;
    color: var(--ps-ink);
}
.flatpickr-day.flatpickr-disabled,
.flatpickr-day.flatpickr-disabled:hover {
    color: var(--ps-ink-3);
}
.flatpickr-day.prevMonthDay,
.flatpickr-day.nextMonthDay {
    color: var(--ps-ink-3);
}
.flatpickr-day.prevMonthDay.weekend,
.flatpickr-day.nextMonthDay.weekend {
    color: var(--ps-ink-3);
}
.flatpickr-prev-month svg,
.flatpickr-next-month svg {
    fill: var(--ps-ink-2);
}
.flatpickr-prev-month:hover svg,
.flatpickr-next-month:hover svg {
    fill: var(--ps-accent);
}
</style>
{% endblock %}
{% block content %}
<script>
window._courses = {{ courses|tojson }};
</script>

{% if no_courses %}
<div class="empty-state">
    <p>No courses yet. <a href="/courses/new">Add your first course</a> to start tracking rounds.</p>
</div>
{% endif %}

<div class="draft-notice" id="draft-resume" style="display:none">
    <p>You have an unfinished round draft.</p>
    <button class="btn btn-accent" id="draft-resume-btn">Resume</button>
    <button class="btn" id="draft-discard-btn">Discard</button>
</div>

<div class="wizard" id="round-wizard"{% if no_courses %} style="display:none"{% endif %}>
    <h1 class="wizard-title">New Round</h1>

    <div class="wizard-step" data-step="date">
        <label class="step-label">Date</label>
        <input type="text" class="step-input" id="round-date"
               placeholder="YYYY-MM-DD" value="{{ today }}">
    </div>

    <div class="wizard-step" data-step="course">
        <label class="step-label">Course</label>
        <select class="step-input" id="round-course">
            <option value="">Select course...</option>
            {% for name, course in courses.items() %}
            <option value="{{ name }}">{{ name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="wizard-step" data-step="tee" style="display:none">
        <label class="step-label">Tees</label>
        <select class="step-input" id="round-tee">
            <option value="">Select tees...</option>
        </select>
    </div>

    <div class="wizard-step" data-step="holes" style="display:none">
        <label class="step-label">Holes Played</label>
        <div class="radio-group">
            <label><input type="radio" name="holes_played" value="18"> Full 18</label>
            <label><input type="radio" name="holes_played" value="front9"> Front 9</label>
            <label><input type="radio" name="holes_played" value="back9"> Back 9</label>
        </div>
    </div>

    <div class="wizard-step" data-step="transport" style="display:none">
        <label class="step-label">Transport</label>
        <div class="radio-group">
            <label><input type="radio" name="transport" value=""> N/A</label>
            <label><input type="radio" name="transport" value="walking"> Walking</label>
            <label><input type="radio" name="transport" value="riding"> Riding</label>
        </div>
    </div>

    <div class="wizard-step" data-step="entry_mode" style="display:none">
        <label class="step-label">Entry Mode</label>
        <div class="radio-group">
            <label><input type="radio" name="entry_mode" value="detailed"> Detailed (hole-by-hole)</label>
            <label><input type="radio" name="entry_mode" value="score_only"> Score Only</label>
        </div>
    </div>

    <div class="wizard-step" data-step="holes_detail" style="display:none">
        <label class="step-label">Hole Scores</label>

        <div class="desktop-hole-progress" id="desktop-hole-progress"></div>

        <div class="hole-progress mobile-cards" id="hole-progress-bar"></div>

        <div id="scorecard-area"></div>

        <div class="inline-error" id="inline-error" style="display:none"></div>

        <div class="desktop-running-stats" id="desktop-running-stats">
            <span>Gross: <strong id="rs-gross">&mdash;</strong></span>
            <span>Putts: <strong id="rs-putts">&mdash;</strong></span>
            <span>GIR: <strong id="rs-gir">&mdash;</strong></span>
            <span>FIR: <strong id="rs-fir">&mdash;</strong></span>
        </div>

        <div class="hole-cards" id="hole-cards-area"></div>
    </div>

    <div class="wizard-step" data-step="notes" style="display:none">
        <label class="step-label">Notes</label>
        <textarea class="step-input" id="round-notes" rows="3"
                  placeholder="Optional: weather, swing thoughts, course conditions..."></textarea>
        <button class="btn btn-accent" id="notes-continue" style="margin-top:0.75rem">Continue</button>
    </div>

    <div class="wizard-step" data-step="match" style="display:none">
        <label class="step-label">Add to Match (optional)</label>
        <select class="step-input" id="round-match">
            <option value="">No match</option>
            {% for m in matches %}
            <option value="{{ m.id }}">{{ m.course_name }} — {{ m.date }}</option>
            {% endfor %}
        </select>
        <button class="btn btn-accent" id="submit-round" style="margin-top:0.75rem">Save Round</button>
    </div>
</div>
<script src="/static/flatpickr.min.js"></script>
{% endblock %}

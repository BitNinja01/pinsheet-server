{% extends "auth_base.html" %}
{% block title %}Reset Password{% endblock %}
{% block auth_content %}
<h2 class="auth-heading">Reset Password</h2>

{% if error %}
<div class="auth-error">{{ error }}</div>
{% endif %}

{% if valid %}
<form method="POST" class="auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="token" value="{{ token }}">
    <div class="auth-field">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" required minlength="8" autocomplete="new-password">
    </div>
    <div class="auth-field">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" required minlength="8" autocomplete="new-password">
    </div>
    <button type="submit" class="auth-button">Set New Password</button>
</form>
{% endif %}

<p class="auth-footer">
    <a href="{{ url_for('login_page') }}">Back to login</a>
</p>
{% endblock %}
